; PlatformIO project for the RSVP Pocket Reader firmware.
; Board: Waveshare ESP32-S3-Touch-AMOLED-2.41.
;
; Hardware values below are confirmed from the actual board over USB
; (esptool flash-id, 2026-06-28): ESP32-S3 (rev v0.2), 16 MB quad flash,
; 8 MB embedded PSRAM (ESP32-S3R8 → octal/OPI PSRAM), native USB-Serial/JTAG.
; Still TODO: add Waveshare's QSPI AMOLED + I2C touch driver libs from their demo.

[env:esp32-s3-amoled-2_41]
; pioarduino fork — official PlatformIO espressif32 is stuck on arduino-esp32 2.x,
; but Arduino_GFX 1.6.x needs the 3.x core (esp32-hal-periman.h). This provides it.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1          ; generic S3 base; overrides below match the real board
framework = arduino

; --- memory: 16 MB QIO flash + 8 MB OPI PSRAM (S3R8) ---
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv

; --- native USB CDC so Serial works over the USB-C port (no UART bridge) ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -std=gnu++17

; --- upload / monitor over the board's native USB ---
monitor_speed = 115200
; If auto-detect picks the wrong port, uncomment and set explicitly:
; upload_port = /dev/cu.usbmodem14301
; monitor_port = /dev/cu.usbmodem14301

lib_deps =
    ; --- M1 (light the screen): panel driver only; expander driven directly over I2C ---
    moononournation/GFX Library for Arduino@^1.6.0
    ; --- added in later milestones ---
    ; lvgl/lvgl@^9.1.0            ; M2: Renderer
    ; bblanchon/ArduinoJson@^7    ; M4: settings/.rsvp
    ; Waveshare Arduino_DriveBus  ; M3: FT6336 touch + expander helpers (git URL TBD from demo)
    ; SD support is bundled with the Arduino-ESP32 framework

; The pure-logic core (RsvpEngine/pivot/tokenizer) is also verified on the host:
;   g++ -std=c++17 firmware/test/test_engine.cpp firmware/src/RsvpEngine.cpp -o /tmp/te && /tmp/te
