; PlatformIO project for the RSVP Pocket Reader firmware.
; Starting config — set `board` to the exact Waveshare variant and add their
; ESP32-S3-Touch-AMOLED-2.41 display/touch driver libs from the board demo.

[env:esp32-s3-amoled-2_41]
platform = espressif32
board = esp32-s3-devkitc-1      ; TODO: exact board / custom board.json
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -std=gnu++17
lib_deps =
    lvgl/lvgl@^9.1.0
    ; + Waveshare AMOLED (QSPI) + capacitive touch (I2C) drivers from their demo
    ; + ArduinoJson (settings), SD

; The pure-logic core (RsvpEngine/pivot/tokenizer) is also verified on the host:
;   g++ -std=c++17 firmware/test/test_engine.cpp firmware/src/RsvpEngine.cpp -o /tmp/te && /tmp/te
