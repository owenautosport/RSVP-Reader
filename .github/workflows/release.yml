name: Build & Release

# Builds the installers on real Windows and macOS runners and publishes them to
# a GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # allow manual runs too

permissions:
  contents: write           # needed to create the release

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install pyinstaller pypdf
      - name: Build app (PyInstaller)
        run: pyinstaller --noconfirm packaging/rsvp.spec
      - name: Read version
        id: ver
        shell: bash
        run: echo "v=$(python -c 'import rsvp; print(rsvp.__version__)')" >> "$GITHUB_OUTPUT"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer (Inno Setup)
        run: iscc /DAppVersion=${{ steps.ver.outputs.v }} packaging\installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/installer/*.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install pyinstaller pypdf
      - name: Build app + DMG
        run: bash packaging/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: installer/*.dmg

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
